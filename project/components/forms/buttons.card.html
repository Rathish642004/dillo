<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body { margin:0; padding:24px; background:var(--bg-page); }
    .grid { display: grid; grid-template-columns: 120px 1fr; gap: 20px 24px; align-items:center; }
    .lbl { font-family: var(--font-heading); font-weight: 700; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--ls-eyebrow); }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton } = window.DilloUniformsDesignSystem_8624ed;
    const Arrow = () => <span aria-hidden style={{fontSize:14}}>→</span>;
    function Card() {
      return (
        <div className="grid">
          <div className="lbl">Variants</div>
          <div className="row">
            <Button variant="primary">Get a quote</Button>
            <Button variant="navy">View products</Button>
            <Button variant="secondary">Talk to us</Button>
            <Button variant="ghost">Learn more</Button>
          </div>
          <div className="lbl">Sizes</div>
          <div className="row">
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg" iconRight={<Arrow/>}>Large with icon</Button>
          </div>
          <div className="lbl">States</div>
          <div className="row">
            <Button>Default</Button>
            <Button disabled>Disabled</Button>
            <Button variant="secondary" iconLeft={<span>＋</span>}>With icon</Button>
            <Button block style={{maxWidth:240}}>Block</Button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Card/>);
  </script>
</body>
</html>
