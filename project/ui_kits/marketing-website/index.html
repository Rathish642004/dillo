<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { NavBar, Footer, WhatsAppFab } = window.DilloUniformsDesignSystem_8624ed;

    function App() {
      const [page, setPage] = React.useState("home");

      React.useEffect(() => {
        window.scrollTo({ top: 0, behavior: "instant" });
      }, [page]);

      let Body;
      switch (page) {
        case "home":      Body = <window.HomePage      onNavigate={setPage} />; break;
        case "about":     Body = <window.AboutPage     onNavigate={setPage} />; break;
        case "products":  Body = <window.ProductsPage  onNavigate={setPage} />; break;
        case "portfolio": Body = <window.PortfolioPage onNavigate={setPage} />; break;
        case "contact":   Body = <window.ContactPage   onSubmit={() => {}} />;  break;
        default:          Body = <window.HomePage      onNavigate={setPage} />;
      }

      return (
        <>
          <NavBar active={page} onNavigate={setPage} onCta={() => setPage("contact")} />
          {Body}
          <Footer onNavigate={setPage} />
          <WhatsAppFab />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
