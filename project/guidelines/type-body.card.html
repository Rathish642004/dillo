<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; padding:20px 24px; background:var(--bg-page); display:flex; flex-direction:column; gap:8px; }
    p { font-family: var(--font-body); color: var(--text-primary); margin:0; }
    .lg { font-size: 18px; line-height: 1.5; }
    .md { font-size: 16px; line-height: 1.5; }
    .sm { font-size: 14px; line-height: 1.5; color: var(--text-secondary); }
    .cap { font-size: 12px; line-height: 1.4; color: var(--text-muted); }
    .row { display:flex; align-items:baseline; gap:12px; }
    .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left:auto; }
  </style>
</head>
<body>
  <div class="row"><p class="lg">Twenty years stitching uniforms for hospitals, hotels and classrooms.</p><div class="meta">lg · 18/1.5</div></div>
  <div class="row"><p class="md">From 50 to 50,000 pieces. Same quality control either way.</p><div class="meta">md · 16/1.5</div></div>
  <div class="row"><p class="sm">Quotes within 24 hours, samples in a week.</p><div class="meta">sm · 14/1.5</div></div>
  <div class="row"><p class="cap">Free PAN-India delivery on orders above ₹50,000.</p><div class="meta">caption · 12/1.4</div></div>
</body>
</html>
