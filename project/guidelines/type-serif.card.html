<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; padding:22px 28px; background:var(--bg-page); display:flex; flex-direction:column; gap: 12px; }
    .quote { font-family: var(--font-serif); color: var(--text-primary); font-size: 28px; line-height: 1.25; font-style: italic; font-weight: 400; max-width: 560px; }
    .tag { font-family: var(--font-serif); color: var(--text-primary); font-size: 22px; font-style: italic; }
    .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="tag">The Perfect Uniform Makers <span class="meta">— logo tagline, 22/italic</span></div>
  <hr class="dillo-rule">
  <div class="quote">"Six hospitals, same fabric grade across all of them. Dillo just gets it."</div>
</body>
</html>
