<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin:0; padding:20px 24px; background:var(--bg-page); }
    .display { font-family: var(--font-display); color: var(--text-primary); letter-spacing: -0.02em; line-height: 1.0; }
    .xl { font-size: 64px; }
    .lg { font-size: 44px; }
    .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .row { display:flex; align-items:baseline; gap:14px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="row"><div class="display xl">Built to last.</div><div class="meta">display-lg · 64/1.0 · 900</div></div>
  <div class="row"><div class="display lg">Delivered on time.</div><div class="meta">display-md · 44/1.0 · 900</div></div>
</body>
</html>
