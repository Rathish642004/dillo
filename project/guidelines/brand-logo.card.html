<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 24px; display: flex; align-items: center; gap: 28px; background: var(--bg-page); }
    .logo { width: 360px; height: auto; box-shadow: var(--shadow-sm); }
    .meta { display: flex; flex-direction: column; gap: 8px; }
    .meta .name { font-family: var(--font-display); font-size: 28px; color: var(--text-primary); }
    .meta .tag  { font-family: var(--font-serif); font-style: italic; color: var(--text-primary); font-size: 17px; }
    .meta .file { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
  </style>
</head>
<body>
  <img class="logo" src="../assets/logo-dillo.jpg" alt="Dillo Uniforms — The Perfect Uniform Makers">
  <div class="meta">
    <div class="name">DILLO</div>
    <div class="tag">The Perfect Uniform Makers</div>
    <hr class="dillo-rule" style="margin-top: 6px">
    <div class="file">assets/logo-dillo.jpg</div>
  </div>
</body>
</html>
